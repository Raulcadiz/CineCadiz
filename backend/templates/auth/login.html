<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — CineCadiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --cc-red: #e50914; }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .brand { color: var(--cc-red); font-size: 1.5rem; font-weight: 800; }
        .btn-primary { background: var(--cc-red); border-color: var(--cc-red); }
        .btn-primary:hover { background: #c50812; border-color: #c50812; }
        .form-control {
            background: #111;
            border-color: #333;
            color: #fff;
        }
        .form-control:focus {
            background: #111;
            border-color: var(--cc-red);
            color: #fff;
            box-shadow: 0 0 0 .2rem rgba(229,9,20,.25);
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <div class="brand"><i class="bi bi-camera-reels-fill"></i> CineCadiz</div>
        <p class="text-muted mt-1 mb-0" style="font-size:.85rem">Panel de usuario</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2" role="alert">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login_post') }}">
        <div class="mb-3">
            <label class="form-label text-secondary small">Usuario</label>
            <input type="text" name="usuario" class="form-control"
                   placeholder="nombre de usuario" autocomplete="username" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label text-secondary small">Contraseña</label>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
        </button>
    </form>

    <div class="text-center mt-3">
        <small class="text-muted">
            ¿No tienes cuenta? Necesitas una <strong>invitación</strong> de un miembro.
        </small>
    </div>
    <div class="text-center mt-2">
        <a href="{{ url_for('index') }}" class="text-secondary text-decoration-none" style="font-size:.85rem">
            <i class="bi bi-arrow-left me-1"></i> Volver a la web
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
