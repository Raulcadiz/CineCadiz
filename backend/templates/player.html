<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or 'Reproductor' }} — CineCadiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; }
        #bar { color: #ccc; font-size: .85rem; padding: .4rem .8rem; background: #111; flex-shrink: 0; }
        video { flex: 1; width: 100%; display: block; background: #000; }
        #err { color: #f66; padding: 1rem; display: none; font-size: .9rem; }
    </style>
</head>
<body>
    {% if title %}<div id="bar">📡 {{ title }}</div>{% endif %}
    <video id="v" controls autoplay playsinline></video>
    <div id="err"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <script>
        const v   = document.getElementById('v');
        const err = document.getElementById('err');
        const url = {{ url | tojson }};

        function showErr(msg) {
            err.style.display = 'block';
            err.textContent = '❌ ' + msg;
        }

        const urlLow = url.toLowerCase().split('?')[0];
        const isTs   = urlLow.endsWith('.ts');
        const isM3u8 = urlLow.endsWith('.m3u8') || urlLow.includes('.m3u8?');

        if (isM3u8 || (!isTs && typeof Hls !== 'undefined' && Hls.isSupported())) {
            const hls = new Hls({ xhrSetup: xhr => { xhr.withCredentials = false; } });
            hls.loadSource(url);
            hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {}));
            hls.on(Hls.Events.ERROR, (_, d) => {
                if (d.fatal) showErr('Stream no disponible o formato no compatible.');
            });
        } else if (isTs && typeof mpegts !== 'undefined' && mpegts.isSupported()) {
            const p = mpegts.createPlayer({ type: 'mpegts', url, isLive: true });
            p.attachMediaElement(v);
            p.load();
            v.play().catch(() => {});
            p.on(mpegts.Events.ERROR, () => showErr('Stream no disponible o formato no compatible.'));
        } else {
            v.src = url;
            v.onerror = () => showErr('Stream no disponible o formato no compatible.');
        }
    </script>
</body>
</html>
